<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gopal Mobiles Stock Manager Pro</title>
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        :root {
            --primary: #F28C38;
            --primary-dark: #d97a30;
            --bg-light: #f8f9fa;
            --bg-dark: #1a1a1a;
            --card-light: #ffffff;
            --card-dark: #2d2d2d;
            --text-light: #333;
            --text-dark: #f4f4f4;
            --success: #28a745;
            --danger: #dc3545;
            --border-light: #eee;
            --border-dark: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-light); color: var(--text-light); transition: 0.3s; line-height: 1.6; }
        body.dark-mode { background-color: var(--bg-dark); color: var(--text-dark); }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        /* Dashboard Styles */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-light); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid var(--primary); }
        .dark-mode .stat-card { background: var(--card-dark); }
        .stat-card h3 { font-size: 0.9rem; text-transform: uppercase; color: #777; margin-bottom: 10px; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { color: var(--primary); font-size: 1.5rem; }

        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; min-height: 44px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }

        section { background: var(--card-light); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .dark-mode section { background: var(--card-dark); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: transparent; color: inherit; font-size: 1rem; }

        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--primary); color: white; text-align: left; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border-light); }
        .dark-mode td { border-bottom-color: var(--border-dark); }

        tr.sold { opacity: 0.7; background-color: rgba(220, 53, 69, 0.05); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-available { background: #d4edda; color: #155724; }
        .badge-sold { background: #f8d7da; color: #721c24; }

        /* Hidden Utility */
        .hidden { display: none !important; }

        /* Modal Styles */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #video { width: 100%; max-width: 500px; border-radius: 10px; border: 3px solid var(--primary); }

        /* Report Specific */
        .report-content { width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; background: white; padding: 20px; border-radius: 8px; }
        .dark-mode .report-content { background: var(--card-dark); color: var(--text-dark); }
        
        .sale-card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; background: #fff; margin-bottom: 10px; }
        .dark-mode .sale-card { background: #3d3d3d; border-color: #555; }

        @media (max-width: 600px) {
            .stat-card { padding: 10px; }
            .stat-card p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📱 Gopal Mobiles</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="toggleDarkMode()">🌓 Mode</button>
            <button class="btn btn-primary" onclick="openReportModal()">📊 Report</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <h3>In Stock</h3>
            <p id="dash-total-stock">0</p>
        </div>
        <div class="stat-card">
            <h3>Inventory Value</h3>
            <p id="dash-total-value">₹0</p>
        </div>
        <div class="stat-card" style="border-bottom-color: var(--success);">
            <h3>Sold (Total)</h3>
            <p id="dash-total-sold">0</p>
        </div>
    </div>

    <section id="form-section">
        <h2 id="formTitle" style="margin-bottom:15px">Add New Stock</h2>
        <form id="stockForm">
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-group">
                    <label>Model Name</label>
                    <input type="text" id="model" required placeholder="e.g. iPhone 15">
                </div>
                <div class="form-group">
                    <label>IMEI / Serial</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="imei" required>
                        <button type="button" class="btn btn-success" onclick="startScanning()">📷</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>RAM/ROM</label>
                    <select id="ramRomSelect" onchange="handleRamRomChange()">
                        <option value="4GB/64GB">4-64</option>
                        <option value="6GB/128GB">6-128</option>
                        <option value="8GB/128GB" selected>8-128</option>
                        <option value="8GB/256GB">8-256</option>
                        <option value="12GB/256GB">12-256</option>
                        <option value="custom">Custom...</option>
                    </select>
                    <input type="text" id="ramRomCustom" class="hidden" style="margin-top:5px" placeholder="Enter specs">
                </div>
                <div class="form-group">
                    <label>Purchase Price (₹)</label>
                    <input type="number" id="purchasePrice" required min="0">
                </div>
                <div class="form-group">
                    <label>Dealer</label>
                    <input type="text" id="dealer" required placeholder="Supplier name">
                </div>
            </div>
            
            <div id="soldFields" class="form-grid hidden" style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: 10px;">
                <div class="form-group">
                    <label>Sold Date</label>
                    <input type="date" id="soldDate">
                </div>
                <div class="form-group">
                    <label>Sold Price (₹)</label>
                    <input type="number" id="soldPrice">
                </div>
            </div>

            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Save Product</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()" style="flex: 1;">Cancel</button>
            </div>
        </form>
    </section>

    <section>
        <div class="form-grid">
            <div class="form-group">
                <label>Search Inventory</label>
                <input type="text" id="searchInput" placeholder="Search Model or IMEI..." oninput="renderTable()">
            </div>
            <div class="form-group">
                <label>Status Filter</label>
                <select id="filterStatus" onchange="renderTable()">
                    <option value="all">All Items</option>
                    <option value="available">Available Only</option>
                    <option value="sold">Sold Only</option>
                </select>
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
                <button class="btn btn-outline" style="width: 100%;" onclick="exportToCSV()">📤 Export CSV</button>
            </div>
        </div>
    </section>

    <section>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Model Details</th>
                        <th>IMEI</th>
                        <th>Purchase</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Sold For</th>
                        <th>Profit</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="scannerModal" class="modal hidden">
    <h2 style="color: white; margin-bottom: 10px;">Scan Barcode</h2>
    <video id="video"></video>
    <button class="btn btn-primary" style="margin-top: 20px; width: 200px;" onclick="stopScanning()">Close</button>
</div>

<div id="reportModal" class="modal hidden">
    <div class="report-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Daily Sales Report</h2>
            <button class="btn btn-secondary" style="min-height: 30px;" onclick="closeReportModal()">✕</button>
        </div>
        <hr style="margin: 15px 0;">
        <div class="form-group">
            <label>Select Sales Date</label>
            <input type="date" id="reportDate" onchange="updateDailyReport()">
        </div>
        <div id="reportResult">
            <p style="text-align: center; color: #888; padding: 20px;">Please select a date to view sales activity.</p>
        </div>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let stock = [];
    const STORAGE_KEY = 'stock';
    let codeReader = null;

    // --- INITIALIZATION ---
    window.onload = () => {
        loadData();
        checkTheme();
        renderTable();
    };

    function loadData() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        try {
            const parsed = JSON.parse(rawData) || [];
            stock = parsed.map(item => ({
                id: item.id || Date.now() + Math.random(),
                model: item.model || 'Unknown',
                imei: item.imei || 'N/A',
                ramRom: item.ramRom || 'N/A',
                purchasePrice: Number(item.purchasePrice) || 0,
                dealer: item.dealer || 'N/A',
                status: item.status || 'available',
                receivedDate: item.receivedDate || new Date().toLocaleDateString('en-GB'),
                soldDate: item.soldDate || '',
                soldPrice: Number(item.soldPrice) || 0,
                profitLoss: Number(item.profitLoss) || 0
            }));
        } catch (e) {
            stock = [];
            console.error("Data error. Resetting.");
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stock));
        updateDashboard();
    }

    // --- CORE LOGIC ---
    function handleRamRomChange() {
        const select = document.getElementById('ramRomSelect');
        const customInput = document.getElementById('ramRomCustom');
        customInput.classList.toggle('hidden', select.value !== 'custom');
    }

    document.getElementById('stockForm').onsubmit = function(e) {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const ramRom = document.getElementById('ramRomSelect').value === 'custom' 
            ? document.getElementById('ramRomCustom').value 
            : document.getElementById('ramRomSelect').value;

        const originalItem = editId ? stock.find(i => i.id == editId) : null;

        const formData = {
            id: editId ? Number(editId) : Date.now(),
            model: document.getElementById('model').value,
            imei: document.getElementById('imei').value,
            ramRom: ramRom,
            purchasePrice: Number(document.getElementById('purchasePrice').value),
            dealer: document.getElementById('dealer').value,
            status: originalItem ? originalItem.status : 'available',
            receivedDate: originalItem ? originalItem.receivedDate : new Date().toLocaleDateString('en-GB'),
            soldDate: document.getElementById('soldDate').value,
            soldPrice: Number(document.getElementById('soldPrice').value),
        };

        if (formData.soldPrice > 0) {
            formData.status = 'sold';
            if(!formData.soldDate) formData.soldDate = new Date().toISOString().split('T')[0];
            formData.profitLoss = formData.soldPrice - formData.purchasePrice;
        } else {
            formData.status = 'available';
            formData.soldDate = '';
            formData.profitLoss = 0;
        }

        if (editId) {
            stock = stock.map(i => i.id == editId ? formData : i);
        } else {
            stock.push(formData);
        }

        saveData();
        resetForm();
        renderTable();
        alert("Stock updated successfully!");
    };

    function renderTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('filterStatus').value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        const filtered = stock.filter(item => {
            const matchesSearch = item.model.toLowerCase().includes(query) || item.imei.toLowerCase().includes(query);
            const matchesStatus = statusFilter === 'all' || item.status === statusFilter;
            return matchesSearch && matchesStatus;
        });

        filtered.reverse().forEach(item => {
            const row = document.createElement('tr');
            if(item.status === 'sold') row.classList.add('sold');

            row.innerHTML = `
                <td><strong>${item.model}</strong><br><small style="color: #666;">${item.ramRom}</small></td>
                <td><code>${item.imei}</code></td>
                <td>₹${item.purchasePrice}</td>
                <td><span class="badge badge-${item.status}">${item.status.toUpperCase()}</span></td>
                <td><small>${item.status === 'sold' ? item.soldDate : item.receivedDate}</small></td>
                <td>${item.soldPrice ? '₹' + item.soldPrice : '-'}</td>
                <td style="color: ${item.profitLoss >= 0 ? 'green' : 'red'}">${item.status === 'sold' ? '₹' + item.profitLoss : '-'}</td>
                <td>
                    <button class="btn btn-outline" style="padding: 5px 8px; min-height: 30px;" onclick="editItem(${item.id})">Edit</button>
                    ${item.status === 'available' ? `<button class="btn btn-success" style="padding: 5px 8px; min-height: 30px;" onclick="quickSell(${item.id})">Sell</button>` : ''}
                    <button class="btn btn-secondary" style="padding: 5px 8px; min-height: 30px; background: #999;" onclick="deleteItem(${item.id})">Del</button>
                </td>
            `;
            tbody.appendChild(row);
        });
        updateDashboard();
    }

    function updateDashboard() {
        const available = stock.filter(i => i.status === 'available');
        const sold = stock.filter(i => i.status === 'sold');
        document.getElementById('dash-total-stock').textContent = available.length;
        document.getElementById('dash-total-sold').textContent = sold.length;
        const totalVal = available.reduce((sum, item) => sum + item.purchasePrice, 0);
        document.getElementById('dash-total-value').textContent = '₹' + totalVal.toLocaleString('en-IN');
    }

    function quickSell(id) {
        const price = prompt("Enter final sold price:");
        if (price === null || price === "") return;
        const item = stock.find(i => i.id === id);
        item.status = 'sold';
        item.soldPrice = Number(price);
        item.soldDate = new Date().toISOString().split('T')[0];
        item.profitLoss = item.soldPrice - item.purchasePrice;
        saveData();
        renderTable();
    }

    function editItem(id) {
        const item = stock.find(i => i.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('model').value = item.model;
        document.getElementById('imei').value = item.imei;
        document.getElementById('purchasePrice').value = item.purchasePrice;
        document.getElementById('dealer').value = item.dealer;
        document.getElementById('formTitle').textContent = "Editing: " + item.model;
        
        const soldFields = document.getElementById('soldFields');
        if (item.status === 'sold') {
            soldFields.classList.remove('hidden');
            document.getElementById('soldDate').value = item.soldDate;
            document.getElementById('soldPrice').value = item.soldPrice;
        } else {
            soldFields.classList.add('hidden');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteItem(id) {
        if (confirm("Delete this product permanently?")) {
            stock = stock.filter(i => i.id !== id);
            saveData();
            renderTable();
        }
    }

    function resetForm() {
        document.getElementById('stockForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('formTitle').textContent = "Add New Stock";
        document.getElementById('soldFields').classList.add('hidden');
        document.getElementById('ramRomCustom').classList.add('hidden');
    }

    function openReportModal() { document.getElementById('reportModal').classList.remove('hidden'); }
    function closeReportModal() { document.getElementById('reportModal').classList.add('hidden'); }

    // --- UPGRADED REPORT LOGIC ---
    function updateDailyReport() {
        const date = document.getElementById('reportDate').value;
        const sales = stock.filter(i => i.soldDate === date);
        const resultDiv = document.getElementById('reportResult');
        
        if (sales.length === 0) {
            resultDiv.innerHTML = `<p style="text-align:center; padding:20px; color:#888;">No sales on ${date || 'selected date'}.</p>`;
            return;
        }

        const totalRev = sales.reduce((s, i) => s + i.soldPrice, 0);
        const totalProf = sales.reduce((s, i) => s + i.profitLoss, 0);

        let reportHTML = `
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f0f0f0; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                <div><small>Units Sold</small><br><strong>${sales.length}</strong></div>
                <div><small>Net Profit</small><br><strong style="color:${totalProf >= 0 ? 'green' : 'red'}">₹${totalProf.toLocaleString('en-IN')}</strong></div>
                <div style="grid-column: span 2; border-top: 1px solid #ccc; margin-top:5px; padding-top:5px;">
                    <small>Total Cash In</small><br><strong>₹${totalRev.toLocaleString('en-IN')}</strong>
                </div>
            </div>
            <h4 style="margin-bottom:10px;">Product Details:</h4>
            <div style="display: flex; flex-direction: column; gap: 10px;">
        `;

        sales.forEach(item => {
            reportHTML += `
                <div class="sale-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <strong style="color: var(--primary);">${item.model}</strong><br>
                            <small style="font-size:0.75rem;">Specs: ${item.ramRom}</small>
                        </div>
                        <span class="badge badge-sold">SOLD</span>
                    </div>
                    <div style="margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; font-size: 0.8rem;">
                        <div><strong>IMEI:</strong> ${item.imei}</div>
                        <div><strong>Dealer:</strong> ${item.dealer}</div>
                        <div style="margin-top:4px;"><strong>Cost:</strong> ₹${item.purchasePrice}</div>
                        <div style="margin-top:4px;"><strong>Sold:</strong> ₹${item.soldPrice}</div>
                    </div>
                    <div style="margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 5px; text-align: right; font-weight: bold; color: ${item.profitLoss >= 0 ? 'green' : 'red'}">
                        Profit: ₹${item.profitLoss}
                    </div>
                </div>
            `;
        });

        reportHTML += `</div>`;
        resultDiv.innerHTML = reportHTML;
    }

    function exportToCSV() {
        let csv = "Model,IMEI,RAM_ROM,PurchasePrice,Dealer,Status,SoldDate,SoldPrice,Profit\n";
        stock.forEach(i => {
            csv += `"${i.model}","${i.imei}","${i.ramRom}",${i.purchasePrice},"${i.dealer}",${i.status},${i.soldDate},${i.soldPrice},${i.profitLoss}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Stock_Report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function startScanning() {
        document.getElementById('scannerModal').classList.remove('hidden');
        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                document.getElementById('imei').value = result.text;
                stopScanning();
            }
        });
    }

    function stopScanning() {
        if (codeReader) {
            codeReader.reset();
            document.getElementById('scannerModal').classList.add('hidden');
        }
    }

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function checkTheme() {
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    }
</script>
</body>
</html>
